<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #000; --border: #262626; --accent: #0095f6; --text: #fff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        .section { display: none; padding-bottom: 70px; min-height: 100vh; }
        .active { display: block; }
        
        /* Navbars */
        .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 44px; }
        .footer { background: var(--bg); border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; font-size: 24px; z-index: 1000; }

        /* Post Cards */
        .post-card { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .post-img { width: 100%; display: block; background: #1a1a1a; }
        
        /* Profile Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; }

        /* Full Post View Modal */
        #post-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:5000; overflow-y:auto; }
        
        /* UI Elements */
        .btn-edit { background: var(--border); border: none; color: white; padding: 8px; width: 92%; margin: 10px 4%; border-radius: 8px; font-weight: 600; }
        .story-bar { display: flex; overflow-x: auto; padding: 10px; gap: 12px; border-bottom: 1px solid var(--border); }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fd1d1d; padding: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 22px; font-weight: bold; font-style: italic;">Instagram</div>
        <div style="display:flex; gap:18px;">
            <span onclick="upload()">➕</span>
            <span onclick="show('chat')">📩</span>
        </div>
    </div>

    <div id="post-modal">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; align-items:center;">
            <span onclick="closeModal()" style="font-size:24px; margin-right:20px;">⬅️</span><b>Posts</b>
        </div>
        <div id="modal-content"></div>
    </div>

    <div id="feed" class="section active">
        <div class="story-bar" id="s-list"></div>
        <div id="feed-cont"></div>
    </div>

    <div id="reels" class="section">
        <div id="reels-list" style="height:92vh; overflow-y:scroll; scroll-snap-type:y mandatory;"></div>
    </div>

    <div id="profile" class="section">
        <div style="padding: 20px 15px; display: flex; align-items: center; gap: 20px;">
            <img id="my-dp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            <div style="display: flex; flex: 1; justify-content: space-around; text-align: center;">
                <div><b id="p-count">0</b><br><small>posts</small></div>
                <div><b>267</b><br><small>followers</small></div>
                <div><b>258</b><br><small>following</small></div>
            </div>
        </div>
        <div style="padding:0 15px;"><b id="my-name">tanish_mandloi._</b><br><span style="font-size:14px; color:#ccc;">Breathe. Believe. Begin. 🌿</span></div>
        <button class="btn-edit" onclick="editProfile()">Edit Profile</button>
        <div class="grid" id="my-grid"></div>
    </div>

    <div id="chat" class="section">
        <h3 style="padding:15px;">Inbox</h3>
        <div id="user-list"></div>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = { name: "User" };
        let lastTap = 0;

        auth.onAuthStateChanged(async user => {
            if (user) {
                const d = await db.collection("users").doc(user.uid).get();
                if(d.exists) me = d.data();
                show('feed');
            } else {
                let e = prompt("Email:"), p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(()=>location.reload());
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'feed') { loadFeed(); loadStories(); }
            if(id === 'profile') loadProfile();
            if(id === 'reels') loadReels();
        }

        // --- GRID CLICK & LIKES ---
        async function openPost(pid) {
            const doc = await db.collection("posts").doc(pid).get();
            const d = doc.data();
            document.getElementById('modal-content').innerHTML = `
                <div class="post-card">
                    <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                    <img src="${d.url}" class="post-img">
                    <div style="padding:10px;">❤️ <b>${d.likes || 0} likes</b></div>
                    ${d.uid === auth.currentUser.uid ? `<button onclick="delP('${pid}')" style="color:red; background:none; border:none; padding:10px;">Delete Post</button>` : ''}
                </div>`;
            document.getElementById('post-modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('post-modal').style.display = 'none'; }

        async function likeP(id, el, curLikes) {
            const now = Date.now();
            if(now - lastTap < 300) {
                const postRef = db.collection("posts").doc(id);
                const post = await postRef.get();
                const likers = post.data().likers || [];
                if(!likers.includes(auth.currentUser.uid)) {
                    await postRef.update({ likes: curLikes + 1, likers: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid) });
                }
            }
            lastTap = now;
        }

        // --- LOAD FUNCTIONS ---
        function loadFeed() {
            db.collection("posts").where("type","==","photo").orderBy("time","desc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="post-card">
                        <div style="padding:10px; font-weight:600;">@${d.username}</div>
                        <img src="${d.url}" class="post-img" onclick="likeP('${doc.id}', this, ${d.likes || 0})">
                        <div style="padding:10px;">❤️ <b>${d.likes || 0} likes</b></div>
                    </div>`;
                });
                document.getElementById('feed-cont').innerHTML = h;
            });
        }

        async function loadProfile() {
            document.getElementById('my-name').innerText = me.name;
            const snap = await db.collection("posts").where("uid","==",auth.currentUser.uid).get();
            document.getElementById('p-count').innerText = snap.size;
            let gh = "";
            snap.forEach(doc => gh += `<img src="${doc.data().url}" class="grid-img" onclick="openPost('${doc.id}')">`);
            document.getElementById('my-grid').innerHTML = gh;
        }

        function loadReels() {
            db.collection("posts").where("type","==","reel").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => h += `<div style="height:92vh; scroll-snap-align:start;"><video src="${doc.data().url}" style="width:100%; height:100%; object-fit:cover;" loop autoplay muted playsinline></video></div>`);
                document.getElementById('reels-list').innerHTML = h;
            });
        }

        function upload() {
            const t = confirm("Reel? (Cancel for Photo)") ? "reel" : "photo";
            const u = prompt("URL:");
            if(u) db.collection("posts").add({ url: u, type: t, uid: auth.currentUser.uid, username: me.name, likes: 0, likers: [], time: Date.now() });
        }

        function editProfile() {
            const n = prompt("Name:", me.name);
            if(n) db.collection("users").doc(auth.currentUser.uid).set({name: n}).then(()=>location.reload());
        }
    </script>
</body>
</html>
