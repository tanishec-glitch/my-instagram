<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Cricket Predictor</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #060c21; color: white; }
        .header { background: #1a237e; padding: 20px; text-align: center; border-bottom: 3px solid #ffd700; }
        .score-box { font-size: 2.5rem; margin: 10px 0; color: #fff; font-weight: bold; }
        .prediction-card { background: #111827; margin: 15px; padding: 20px; border-radius: 12px; border: 1px solid #374151; }
        .bet-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .yes { background: #22c55e; color: white; }
        .no { background: #ef4444; color: white; }
        .wallet-bar { display: flex; justify-content: space-around; background: #000; padding: 10px; font-weight: bold; color: #ffd700; }
    </style>
</head>
<body>

    <div class="wallet-bar">
        <span>🪙 COINS: <span id="user-coins">4950</span></span>
        <span>💎 GEMS: <span id="user-gems">66</span></span>
    </div>

    <div class="header">
        <div>LIVE: IND vs AUS</div>
        <div class="score-box" id="live-score">145/3</div>
        <div id="live-over">Overs: 18.4</div>
    </div>

    <div class="prediction-card">
        <h3>Will there be a 6 in the next over?</h3>
        <button class="bet-btn yes" onclick="placeBet('yes', 100)">YES (2.5x Payout)</button>
        <button class="bet-btn no" onclick="placeBet('no', 100)">NO (1.2x Payout)</button>
    </div>

    <script>
        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "YOUR_PROJECT_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Listen for Live Score Updates
        db.collection("games").doc("live_match").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('live-score').innerText = data.score;
                document.getElementById('live-over').innerText = "Overs: " + data.over;
            }
        });

        function placeBet(choice, amount) {
            alert("Bet Placed on " + choice + " for " + amount + " coins!");
            // Logic to deduct coins from Firebase goes here
        }
    </script>
</body>
</html>
