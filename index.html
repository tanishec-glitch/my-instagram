<!DOCTYPE html>
<html>
<head>
    <title>Instagram Clone</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fafafa; padding-bottom: 60px; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-style: italic; }
        .post { background: white; border: 1px solid #dbdbdb; margin: 20px auto; max-width: 400px; }
        .user-info { padding: 10px; font-weight: bold; }
        .post-img { width: 100%; height: auto; display: block; }
        .post-actions { padding: 10px; font-size: 24px; cursor: pointer; }
        /* This makes the heart turn red when clicked */
        .liked { color: red !important; transform: scale(1.2); }
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header"><h2>Instagram</h2></div>

    <div class="post">
        <div class="user-info">tanishec_glitch</div>
        <img src="https://picsum.photos/400/400?random=1" class="post-img">
        <div class="post-actions">
            <span id="heart1" onclick="toggleLike('heart1')">🤍</span> 💬 ✈️
        </div>
    </div>

    <div class="footer">
        <span>🏠</span><span>🔍</span><span>➕</span><span>❤️</span><span>👤</span>
    </div>

    <script>
        // This is the "brain" that changes the heart
        function toggleLike(id) {
            let heart = document.getElementById(id);
            if (heart.innerHTML === "🤍") {
                heart.innerHTML = "❤️";
                heart.classList.add('liked');
            } else {
                heart.innerHTML = "🤍";
                heart.classList.remove('liked');
            }
        }
    </script>
</body>
</html>
