<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Pro Max v11</title>
    <style>
        :root { 
            --wa-bg: #0b141a; --wa-header: #111b21; --wa-text: white; 
            --wa-accent: #25d366; --wa-dim: #8696a0; --wa-sent: #005c4b; --wa-recv: #202c33;
        }
        .light-mode {
            --wa-bg: #f0f2f5; --wa-header: #ffffff; --wa-text: #111b21;
            --wa-sent: #dcf8c6; --wa-recv: #ffffff; --wa-dim: #667781;
        }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { margin: 0; background: var(--wa-bg); color: var(--wa-text); font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .top-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--wa-header); border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; z-index: 100; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .avatar { width: 50px; height: 50px; background: var(--wa-accent); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #0b141a; font-weight: bold; }

        #chat-window { position: fixed; top: 0; left: 0; z-index: 1000; background: var(--wa-bg); width: 100%; height: 100%; display: none; flex-direction: column; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; padding-bottom: 100px; }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .sent { background: var(--wa-sent); align-self: flex-end; border-top-right-radius: 0; color: white; }
        .recv { background: var(--wa-recv); align-self: flex-start; border-top-left-radius: 0; color: var(--wa-text); }

        .type-area { position: absolute; bottom: 0; width: 100%; padding: 15px 15px 35px 15px; background: var(--wa-header); display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; padding: 14px 20px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: var(--wa-text); outline: none; }
        .send-btn { width: 50px; height: 50px; background: var(--wa-accent); border: none; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .edit-name-btn { position: absolute; right: 15px; font-size: 12px; color: var(--wa-accent); border: 1px solid var(--wa-accent); padding: 2px 8px; border-radius: 10px; }
        .btn { width: 100%; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body class="dark-mode">

    <div id="auth-screen" style="height:100%; display:flex; justify-content:center; align-items:center;">
        <div style="text-align:center;">
            <h1 style="color:var(--wa-accent)">WhatsApp v11</h1>
            <input type="email" id="email" style="width:280px; padding:12px; margin:5px; border-radius:8px; border:none;" placeholder="Email"><br>
            <input type="password" id="pass" style="width:280px; padding:12px; margin:5px; border-radius:8px; border:none;" placeholder="Password"><br>
            <button class="btn" onclick="handleAuth()" style="width:280px;">LOGIN / SIGNUP</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <b style="font-size: 18px;">WhatsApp Lite</b>
            <div style="display:flex; gap:15px; align-items:center;">
                <span onclick="toggleTheme()" style="cursor:pointer; font-size:20px;" id="theme-icon">🌙</span>
                <span onclick="auth.signOut()" style="color:var(--wa-accent); font-size:12px; font-weight:bold;">LOGOUT</span>
            </div>
        </div>
        <div style="padding:15px;"><button class="btn" onclick="addFriend()">+ ADD FRIEND</button></div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="backHome()" style="font-size:24px; cursor:pointer;">←</span>
                <div class="avatar" style="width:35px; height:35px;" id="chat-avatar">?</div>
                <b id="chat-title">Chat</b>
            </div>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Type message...">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04", authDomain: "my-insta-backend.firebaseapp.com", databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com", projectId: "my-insta-backend", storageBucket: "my-insta-backend.firebasestorage.app", messagingSenderId: "955106968523", appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
        let activeChat = "";

        function handleAuth() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p)); }
        
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').innerText = isLight ? "☀️" : "🌙";
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) loadFriends();
        });

        function loadFriends() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val();
                    const displayName = data.nickname || data.email;
                    const div = document.createElement('div');
                    div.className = "chat-item";
                    div.innerHTML = `<div class="avatar">${displayName[0].toUpperCase()}</div>
                                     <div onclick="openChat('${data.email}', '${displayName}')"><b>${displayName}</b><br><small style="color:var(--wa-dim)">${data.email}</small></div>
                                     <span class="edit-name-btn" onclick="setNickname('${child.key}', '${data.email}')">Edit Name</span>`;
                    list.appendChild(div);
                });
            });
        }

        function setNickname(key, email) {
            const newName = prompt("Enter Nickname for " + email + ":");
            if(!newName) return;
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}/${key}`).update({ nickname: newName });
        }

        function openChat(email, name) {
            activeChat = email;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-avatar').innerText = name[0].toUpperCase();
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = document.createElement('div');
                    const isMe = m.val().sender === auth.currentUser.email;
                    d.className = `msg ${isMe ? 'sent' : 'recv'}`;
                    d.innerText = m.val().text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, text: i.value, time: Date.now() });
            i.value = "";
        }

        function addFriend() {
            const email = prompt("Friend's Email:"); if(!email) return;
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            const tID = btoa(email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}/${tID}`).set({ email: email });
            db.ref(`friends/${tID}/${myID}`).set({ email: auth.currentUser.email });
        }

        function backHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
