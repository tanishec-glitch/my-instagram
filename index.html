<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Lite Fix</title>
    <style>
        :root { 
            --wa-bg: #0b141a; --wa-header: #111b21; --wa-text: white; 
            --wa-accent: #25d366; --wa-dim: #8696a0; --wa-sent: #005c4b; --wa-recv: #202c33;
        }
        .light-mode {
            --wa-bg: #f0f2f5; --wa-header: #ffffff; --wa-text: #111b21;
            --wa-sent: #dcf8c6; --wa-recv: #ffffff; --wa-dim: #667781;
        }
        * { box-sizing: border-box; transition: background 0.3s ease; }
        body { margin: 0; background: var(--wa-bg); color: var(--wa-text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER FIX */
        .top-nav { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            background: var(--wa-header); border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; 
        }

        .action-area { padding: 10px 15px; }
        .chat-list { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        
        .chat-item { 
            display: flex; padding: 12px 15px; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative;
        }

        .avatar { 
            width: 48px; height: 48px; background: var(--wa-accent); border-radius: 50%; 
            margin-right: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; color: #0b141a; font-weight: bold; flex-shrink: 0;
        }

        .chat-info { flex: 1; min-width: 0; }
        .chat-info b { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #chat-window { 
            position: fixed; top: 0; left: 0; z-index: 1000; background: var(--wa-bg); 
            width: 100%; height: 100%; display: none; flex-direction: column; 
        }

        #msg-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: cover; padding-bottom: 100px; 
        }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .sent { background: var(--wa-sent); align-self: flex-end; border-top-right-radius: 0; color: white; }
        .recv { background: var(--wa-recv); align-self: flex-start; border-top-left-radius: 0; color: var(--wa-text); }

        .type-area { 
            position: absolute; bottom: 0; width: 100%; padding: 15px 15px 35px 15px; 
            background: var(--wa-header); display: flex; gap: 10px; align-items: center; 
        }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: rgba(255,255,255,0.1); color: var(--wa-text); outline: none; }
        
        .edit-name-btn { 
            font-size: 10px; color: var(--wa-accent); border: 1px solid var(--wa-accent); 
            padding: 2px 6px; border-radius: 8px; margin-left: 10px; white-space: nowrap;
        }

        .btn { 
            width: 100%; padding: 12px; background: var(--wa-accent); border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a;
        }
    </style>
</head>
<body class="dark-mode">

    <div id="auth-screen" style="height:100%; display:flex; justify-content:center; align-items:center; padding: 20px;">
        <div style="text-align:center; width: 100%; max-width: 300px;">
            <h1 style="color:var(--wa-accent)">WhatsApp Lite</h1>
            <input type="email" id="email" class="msg-input" style="width:100%; margin-bottom:10px; background: #2a3942;" placeholder="Email"><br>
            <input type="password" id="pass" class="msg-input" style="width:100%; margin-bottom:15px; background: #2a3942;" placeholder="Password"><br>
            <button class="btn" onclick="handleAuth()">LOGIN / SIGNUP</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <b style="font-size: 18px;">WhatsApp Lite</b>
            <div style="display:flex; gap:15px; align-items:center;">
                <span onclick="toggleTheme()" style="cursor:pointer; font-size:20px;" id="theme-icon">🌙</span>
                <span onclick="auth.signOut()" style="color:var(--wa-accent); font-size:12px; font-weight:bold; cursor:pointer;">LOGOUT</span>
            </div>
        </div>
        <div class="action-area">
            <button class="btn" onclick="addFriend()">+ ADD FRIEND</button>
        </div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="backHome()" style="font-size:24px; cursor:pointer;">←</span>
                <div class="avatar" style="width:35px; height:35px; margin-right: 0;" id="chat-avatar">?</div>
                <b id="chat-title" style="margin-left: 10px;">Chat</b>
            </div>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Type message...">
            <button onclick="sendMsg()" style="background: var(--wa-accent); border:none; width:45px; height:45px; border-radius:50%; font-size:20px; cursor:pointer;">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04", authDomain: "my-insta-backend.firebaseapp.com", databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com", projectId: "my-insta-backend", storageBucket: "my-insta-backend.firebasestorage.app", messagingSenderId: "955106968523", appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
        let activeChat = "";

        function handleAuth() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p)); }
        
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').innerText = isLight ? "☀️" : "🌙";
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) loadFriends();
        });

        function loadFriends() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val();
                    const name = data.nickname || data.email;
                    const div = document.createElement('div');
                    div.className = "chat-item";
                    div.innerHTML = `
                        <div class="avatar">${name[0].toUpperCase()}</div>
                        <div class="chat-info" onclick="openChat('${data.email}', '${name}')">
                            <b>${name}</b>
                            <small style="color:var(--wa-dim); font-size:11px;">${data.email}</small>
                        </div>
                        <span class="edit-name-btn" onclick="setNickname('${child.key}', '${data.email}')">Edit</span>
                    `;
                    list.appendChild(div);
                });
            });
        }

        function setNickname(key, email) {
            const newName = prompt("Enter Nickname for " + email + ":");
            if(newName) {
                const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
                db.ref(`friends/${myID}/${key}`).update({ nickname: newName });
            }
        }

        function openChat(email, name) {
            activeChat = email;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-avatar').innerText = name[0].toUpperCase();
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = document.createElement('div');
                    d.className = `msg ${m.val().sender === auth.currentUser.email ? 'sent' : 'recv'}`;
                    d.innerText = m.val().text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, text: i.value, time: Date.now() });
            i.value = "";
        }

        function addFriend() {
            const email = prompt("Friend's Email:"); if(!email) return;
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            const tID = btoa(email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}/${tID}`).set({ email: email });
            db.ref(`friends/${tID}/${myID}`).set({ email: auth.currentUser.email });
        }
        function backHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
