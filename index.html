<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Pro Max v9</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-header: #111b21; --wa-text: white; --wa-accent: #25d366; --wa-dim: #8696a0; --wa-sent: #005c4b; --wa-recv: #202c33; --trans: all 0.2s ease; }
        .light-mode { --wa-bg: #f0f2f5; --wa-header: #ffffff; --wa-text: #111b21; --wa-sent: #dcf8c6; --wa-recv: #ffffff; --wa-dim: #667781; }
        * { box-sizing: border-box; transition: var(--trans); }
        body { margin: 0; background: var(--wa-bg); color: var(--wa-text); font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #auth-screen, #app-screen, #chat-window { display: none; height: 100%; flex-direction: column; width: 100%; }
        #auth-screen { justify-content: center; align-items: center; display: flex; }
        .input-field { width: 300px; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .btn { width: 300px; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a; }
        .top-nav { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--wa-header); border-bottom: 1px solid #202c33; flex-shrink: 0; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 15px; align-items: center; border-bottom: 0.5px solid #202c33; cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: #3d474c; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        #chat-window { position: fixed; top: 0; left: 0; z-index: 1000; background: var(--wa-bg); }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; padding-bottom: 120px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14.5px; position: relative; color: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: var(--wa-sent); align-self: flex-end; border-top-right-radius: 0; }
        .recv { background: var(--wa-recv); align-self: flex-start; border-top-left-radius: 0; }
        .reply-preview { background: rgba(0,0,0,0.2); border-left: 4px solid var(--wa-accent); padding: 5px; margin-bottom: 5px; border-radius: 4px; font-size: 12px; color: #bbb; }
        .reply-bar { position: absolute; bottom: 85px; left: 0; width: 100%; padding: 10px; background: var(--wa-header); display: none; border-top: 1px solid var(--wa-accent); z-index: 5; }
        .type-area { position: absolute; bottom: 0; width: 100%; padding: 10px 12px 30px 12px; background: var(--wa-header); display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #2a3942; color: white; outline: none; }
        .send-btn { width: 48px; height: 48px; background: var(--wa-accent); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #0b141a; }
    </style>
</head>
<body class="dark-mode">
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    <div id="auth-screen"><div><h1 style="color:var(--wa-accent)">WhatsApp</h1><input type="email" id="email" class="input-field" placeholder="Email"><br><input type="password" id="pass" class="input-field" placeholder="Password"><br><button class="btn" onclick="handleAuth()">LOGIN</button></div></div>
    <div id="app-screen"><div class="top-nav"><b>WhatsApp Lite v9</b><span onclick="auth.signOut()" style="color:var(--wa-accent); font-size:12px;">LOGOUT</span></div><div style="padding:10px;"><button class="btn" style="width:100%" onclick="sendRequest()">+ ADD FRIEND</button></div><div class="chat-list" id="contacts"></div></div>
    <div id="chat-window">
        <div class="top-nav"><div style="display:flex; align-items:center; gap:10px;"><span onclick="backToHome()" style="font-size:24px;">←</span><div class="avatar" style="width:32px; height:32px;">👤</div><div id="chat-with-name" style="font-size:14px; font-weight:bold;">Chat</div></div><span onclick="clearChat()" style="color:#ff4d4d; font-size:11px; font-weight:bold;">CLEAR</span></div>
        <div id="msg-box"></div>
        <div class="reply-bar" id="reply-box"><span id="reply-text"></span><span onclick="cancelReply()" style="float:right; color:red;">X</span></div>
        <div class="type-area"><input type="text" id="m-input" class="msg-input" placeholder="Message"><button class="send-btn" id="main-btn" onclick="sendMsg()">➤</button></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04", authDomain: "my-insta-backend.firebaseapp.com", databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com", projectId: "my-insta-backend", storageBucket: "my-insta-backend.firebasestorage.app", messagingSenderId: "955106968523", appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
        let activeChat = "", replyingTo = null, editingID = null;

        function handleAuth() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p)); }
        auth.onAuthStateChanged(user => { document.getElementById('auth-screen').style.display = user ? 'none' : 'flex'; document.getElementById('app-screen').style.display = user ? 'flex' : 'none'; if(user) loadData(); });

        function loadData() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const fEmail = child.val().email; const div = document.createElement('div');
                    div.className = "chat-item"; div.innerHTML = `<div class="avatar">👤</div><div><b>${fEmail}</b></div>`;
                    div.onclick = () => openChat(fEmail); list.appendChild(div);
                });
            });
        }

        function openChat(email) {
            activeChat = email; document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-with-name').innerText = email;
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const data = m.val(); const isMe = data.sender === auth.currentUser.email;
                    const d = document.createElement('div'); d.className = `msg ${isMe ? 'sent' : 'recv'}`;
                    let html = "";
                    if(data.reply) html += `<div class="reply-preview">${data.reply}</div>`;
                    html += `<span>${data.text}</span><div style="font-size:9px; opacity:0.6; text-align:right;">${data.edited ? '(edited) ' : ''}${new Date(data.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
                    d.innerHTML = html;
                    
                    d.onclick = () => { replyingTo = data.text; document.getElementById('reply-box').style.display = 'block'; document.getElementById('reply-text').innerText = "Replying to: " + data.text; };
                    d.oncontextmenu = (e) => { e.preventDefault(); if(isMe) { document.getElementById('m-input').value = data.text; editingID = m.key; document.getElementById('main-btn').innerText = "📝"; } };
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            if(editingID) {
                db.ref(`chats/${chatID}/${editingID}`).update({ text: i.value, edited: true });
                editingID = null; document.getElementById('main-btn').innerText = "➤";
            } else {
                db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, text: i.value, time: Date.now(), reply: replyingTo });
            }
            i.value = ""; cancelReply();
        }

        function cancelReply() { replyingTo = null; document.getElementById('reply-box').style.display = 'none'; }
        function sendRequest() { const email = prompt("Friend's Email:"); if(!email) return; const myID = btoa(auth.currentUser.email).replace(/[/=]/g, ""); const tID = btoa(email).replace(/[/=]/g, ""); db.ref(`friends/${myID}/${tID}`).set({email:email}); db.ref(`friends/${tID}/${myID}`).set({email:auth.currentUser.email}); }
        function backToHome() { document.getElementById('chat-window').style.display = 'none'; }
        function clearChat() { const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, ""); db.ref(`chats/${chatID}`).remove(); }
    </script>
</body>
</html>
