<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Pro Max</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; overflow-x: hidden; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: bold; font-style: italic; font-size: 22px; }
        .section { display: none; }
        .active { display: block; }
        
        /* Story Styling */
        .story-bar { display: flex; overflow-x: auto; padding: 10px; background: white; border-bottom: 1px solid #dbdbdb; gap: 15px; scrollbar-width: none; }
        .story-circle { width: 62px; height: 62px; border-radius: 50%; border: 3px solid #f09433; padding: 2px; object-fit: cover; cursor: pointer; }
        
        /* Full Screen Story View */
        #story-viewer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:2000; }
        .story-full { width:100%; height:100%; object-fit: contain; }

        /* Post & Heart */
        .post-card { background: white; border-bottom: 1px solid #dbdbdb; margin-bottom: 15px; }
        .post-img-wrap { position: relative; width: 100%; }
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 80px; color: white; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 10; }
        .big-heart.animate { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }

        /* Footer */
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
    </style>
</head>
<body>

    <div class="header">
        Instagram 
        <div style="display:flex; gap:15px; font-style:normal;">
            <span onclick="addStory()">📸</span>
            <span onclick="show('chat')">📩</span>
        </div>
    </div>

    <div id="story-viewer" onclick="this.style.display='none'">
        <img id="s-full-img" class="story-full">
    </div>

    <div id="feed-sec" class="section active">
        <div class="story-bar" id="story-list"></div>
        <div id="posts-list"></div>
    </div>

    <div id="reels-sec" class="section" style="background:black; height:90vh; overflow-y:scroll; scroll-snap-type:y mandatory;"></div>

    <div id="profile-sec" class="section" style="text-align:center; padding:20px;">
        <img id="p-dp" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
        <h3 id="p-name">Loading...</h3>
        <button onclick="document.getElementById('edit-modal').style.display='block'">Edit Profile</button>
        <div id="p-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px; margin-top:20px;"></div>
    </div>

    <div id="edit-modal" style="display:none; position:fixed; top:0; background:white; width:100%; height:100%; z-index:500; padding:20px;">
        <h2>Edit Profile</h2>
        <input id="en" placeholder="Name" style="width:90%; padding:10px; margin:10px;"><br>
        <input id="ed" placeholder="DP URL" style="width:90%; padding:10px; margin:10px;"><br>
        <button onclick="saveP()" style="width:100%; padding:10px; background:#0095f6; color:white; border:none;">Save</button>
        <button onclick="document.getElementById('edit-modal').style.display='none'" style="width:100%; margin-top:10px;">Cancel</button>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = { name: "User", dp: "" };
        let tapTime = 0;

        auth.onAuthStateChanged(async user => {
            if (user) {
                const d = await db.collection("users").doc(user.uid).get();
                if(d.exists) me = d.data();
                show('feed');
            } else {
                let e = prompt("Email:"); let p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(()=>location.reload());
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            if(id === 'feed') { loadFeed(); loadS(); }
            if(id === 'reels') loadReels();
            if(id === 'profile') loadP();
        }

        // --- STORY LOGIC (Alert Hata Diya) ---
        function addStory() {
            const u = prompt("Story Image URL:");
            if(u) db.collection("stories").add({ url: u, uid: auth.currentUser.uid, dp: me.dp || '', name: me.name, time: Date.now() });
        }

        function loadS() {
            db.collection("stories").orderBy("time", "desc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const s = doc.data();
                    h += `<div onclick="viewS('${s.url}')"><img src="${s.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="story-circle"></div>`;
                });
                document.getElementById('story-list').innerHTML = h || "No Stories";
            });
        }

        function viewS(url) {
            document.getElementById('s-full-img').src = url;
            document.getElementById('story-viewer').style.display = 'block';
        }

        // --- FEED & LIKES FIX ---
        function loadFeed() {
            db.collection("posts").where("type","==","photo").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="post-card">
                        <div style="padding:10px; font-weight:bold;">@${d.username || 'user'}</div>
                        <div class="post-img-wrap" onclick="doLike('${doc.id}', ${d.likes || 0}, this)">
                            <div class="big-heart">❤️</div>
                            <img src="${d.url}" style="width:100%">
                        </div>
                        <div style="padding:10px;">❤️ <b>${d.likes || 0} likes</b></div>
                    </div>`;
                });
                document.getElementById('posts-list').innerHTML = h;
            });
        }

        function doLike(id, l, el) {
            const now = Date.now();
            if(now - tapTime < 300) {
                el.querySelector('.big-heart').classList.add('animate');
                setTimeout(()=>el.querySelector('.big-heart').classList.remove('animate'), 800);
                db.collection("posts").doc(id).update({ likes: l + 1 });
            }
            tapTime = now;
        }

        function loadReels() {
            db.collection("posts").where("type","==","reel").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    h += `<div style="height:90vh; scroll-snap-align:start;"><video src="${doc.data().url}" style="width:100%; height:100%; object-fit:cover;" loop autoplay muted playsinline></video></div>`;
                });
                document.getElementById('reels-sec').innerHTML = h;
            });
        }

        function loadP() {
            document.getElementById('p-name').innerText = me.name;
            document.getElementById('p-dp').src = me.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            db.collection("posts").where("uid","==",auth.currentUser.uid).get().then(snap => {
                let gh = ""; snap.forEach(doc => gh += `<img src="${doc.data().url}">`);
                document.getElementById('p-grid').innerHTML = gh;
            });
        }

        async function saveP() {
            const up = { name: document.getElementById('en').value, dp: document.getElementById('ed').value };
            await db.collection("users").doc(auth.currentUser.uid).set(up);
            alert("Saved!"); location.reload();
        }

        function upload() {
            const t = confirm("Reel? (Cancel for Photo)") ? "reel" : "photo";
            const u = prompt("URL:");
            if(u) db.collection("posts").add({ url: u, type: t, uid: auth.currentUser.uid, username: me.name, likes: 0, time: Date.now() });
        }
    </script>
</body>
</html>
