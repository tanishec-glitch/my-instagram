<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-accent: #25d366; --wa-dim: #8696a0; --wa-header: #111b21; }
        body { margin: 0; background: var(--wa-bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* LOGIN SCREEN */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        .input-field { width: 100%; max-width: 300px; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .btn { width: 100%; max-width: 300px; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a; margin-top: 10px; }

        /* MAIN APP SCREEN */
        #app-screen { display: none; flex-direction: column; height: 100vh; }
        .top-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; background: var(--wa-header); }
        .search-bar { margin: 10px 15px; padding: 12px; border-radius: 25px; border: none; background: #202c33; color: white; outline: none; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 0.5px solid #202c33; }
        .avatar { width: 50px; height: 50px; background: #3d474c; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .chat-msg { font-size: 14px; color: var(--wa-dim); }

        .fab { position: fixed; bottom: 85px; right: 20px; background: var(--wa-accent); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #0b141a; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--wa-header); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #202c33; }
        .nav-item { text-align: center; color: var(--wa-dim); font-size: 11px; }
        .active-nav { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="color: var(--wa-accent); font-size: 30px;">WhatsApp</h2>
        <p style="color: var(--wa-dim)">Enter details to start chatting</p>
        <input type="email" id="email" class="input-field" placeholder="Email (test@me.com)">
        <input type="password" id="pass" class="input-field" placeholder="Password (6+ chars)">
        <button class="btn" onclick="handleAuth()">LOGIN / REGISTER</button>
        <p id="err" style="color: #ff4d4d; font-size: 13px; margin-top: 15px;"></p>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <span>WhatsApp</span>
            <div style="display: flex; gap: 20px; font-size: 18px;">
                <span>📷</span><span>🔍</span><span onclick="logout()" style="cursor:pointer">⋮</span>
            </div>
        </div>

        <input type="text" class="search-bar" placeholder="Ask Meta AI or Search">

        <div class="chat-list" id="contacts">
            </div>

        <button class="fab">💬</button>

        <div class="bottom-nav">
            <div class="nav-item active-nav">💬<br>Chats</div>
            <div class="nav-item">⭕<br>Updates</div>
            <div class="nav-item">👥<br>Communities</div>
            <div class="nav-item">📞<br>Calls</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // FIREBASE CONFIG (Aapki Asli Details)
        const firebaseConfig = {
            apiKey: "AIzaSyDEypOjcHmWga-U2Lw-xshTwXYKXY", 
            authDomain: "my-insta-backend.firebaseapp.com",
            databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.appspot.com",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f03"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // AUTH LOGIC
        function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const errDiv = document.getElementById('err');

            if (p.length < 6) {
                errDiv.innerText = "Password kam se kam 6 characters ka ho!";
                return;
            }

            auth.signInWithEmailAndPassword(e, p).catch(() => {
                auth.createUserWithEmailAndPassword(e, p).catch(err => {
                    errDiv.innerText = "Error: " + err.message;
                });
            });
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                loadUsers();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        function logout() { auth.signOut(); }

        function loadUsers() {
            const list = document.getElementById('contacts');
            list.innerHTML = `
                <div class="chat-item">
                    <div class="avatar">👤</div>
                    <div class="chat-info">
                        <div class="chat-name">${auth.currentUser.email} (You)</div>
                        <div class="chat-msg">Tap to message yourself</div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
