<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro | Secure</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-accent: #25d366; --wa-dim: #8696a0; --wa-header: #111b21; --wa-sent: #005c4b; }
        body { margin: 0; background: var(--wa-bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        #auth-screen, #app-screen, #chat-window { display: none; height: 100vh; flex-direction: column; }
        #auth-screen { justify-content: center; align-items: center; padding: 20px; display: flex; }

        .input-field { width: 100%; max-width: 300px; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .btn { width: 100%; max-width: 300px; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a; }

        .top-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--wa-header); font-size: 20px; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 0.5px solid #202c33; }
        .avatar { width: 45px; height: 45px; background: #3d474c; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; }

        .request-box { background: #202c33; margin: 10px; padding: 10px; border-radius: 8px; border-left: 4px solid var(--wa-accent); }
        .req-btns { display: flex; gap: 10px; margin-top: 5px; }
        .small-btn { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; }

        #chat-window { position: fixed; top: 0; width: 100%; background: var(--wa-bg); z-index: 100; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 14px; }
        .sent { background: var(--wa-sent); align-self: flex-end; }
        .recv { background: #202c33; align-self: flex-start; }
        .type-area { padding: 10px; background: var(--wa-header); display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div>
            <h2 style="color: var(--wa-accent)">WhatsApp</h2>
            <input type="email" id="email" class="input-field" placeholder="Email">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="btn" onclick="handleAuth()">LOGIN / REGISTER</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <b>WhatsApp</b>
            <span onclick="auth.signOut()" style="color:var(--wa-accent); font-size:14px;">LOGOUT</span>
        </div>
        <div style="padding: 15px;">
            <button class="btn" style="width:100%" onclick="sendRequest()">+ ADD FRIEND BY EMAIL</button>
        </div>
        <div id="requests-area"></div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav" style="font-size: 16px;">
            <span onclick="backToHome()">← <span id="chat-with-name">Dost</span></span>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="input-field" style="margin:0; flex:1;" placeholder="Type message...">
            <button class="btn" style="width:50px; border-radius:50%" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
          authDomain: "my-insta-backend.firebaseapp.com",
          databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com",
          projectId: "my-insta-backend",
          storageBucket: "my-insta-backend.firebasestorage.app",
          messagingSenderId: "955106968523",
          appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let activeChat = "";

        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) { loadData(); }
        });

        function sendRequest() {
            const email = prompt("Dost ki Email ID dalo:");
            if(!email || email === auth.currentUser.email) return;
            const targetID = btoa(email).replace(/[/=]/g, "");
            db.ref(`requests/${targetID}/${btoa(auth.currentUser.email).replace(/[/=]/g, "")}`).set({
                from: auth.currentUser.email,
                status: 'pending'
            });
            alert("Request bhej di gayi hai!");
        }

        function loadData() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            
            // Load Requests
            db.ref(`requests/${myID}`).on('value', snap => {
                const area = document.getElementById('requests-area');
                area.innerHTML = "";
                snap.forEach(child => {
                    const req = child.val();
                    if(req.status === 'pending') {
                        area.innerHTML += `<div class="request-box">
                            <span>Request from: ${req.from}</span>
                            <div class="req-btns">
                                <button class="small-btn" style="background:var(--wa-accent)" onclick="accept('${child.key}', '${req.from}')">Accept</button>
                                <button class="small-btn" style="background:#ff4d4d" onclick="reject('${child.key}')">Reject</button>
                            </div>
                        </div>`;
                    }
                });
            });

            // Load Friends
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts');
                list.innerHTML = "";
                snap.forEach(child => {
                    list.innerHTML += `<div class="chat-item" onclick="openChat('${child.val().email}')">
                        <div class="avatar">👤</div>
                        <div class="chat-info"><b>${child.val().email}</b><br><small style="color:var(--wa-dim)">Tap to chat</small></div>
                    </div>`;
                });
            });
        }

        function accept(key, email) {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}/${key}`).set({email: email});
            db.ref(`friends/${key}/${myID}`).set({email: auth.currentUser.email});
            db.ref(`requests/${myID}/${key}`).remove();
        }

        function openChat(email) {
            activeChat = email;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-with-name').innerText = email;
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = document.createElement('div');
                    d.className = `msg ${m.val().sender === auth.currentUser.email ? 'sent' : 'recv'}`;
                    d.innerText = m.val().text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input');
            if(!i.value) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({sender: auth.currentUser.email, text: i.value});
            i.value = "";
        }

        function backToHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
