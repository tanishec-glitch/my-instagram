<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Search Friends</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        /* Search Screen Style */
        #search-page { display:none; padding: 15px; }
        .search-bar { width: 100%; padding: 10px; border: 1px solid #dbdbdb; border-radius: 8px; background: #efefef; outline: none; margin-bottom: 20px; }
        .user-result { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; cursor: pointer; }
        .dp-med { width: 44px; height: 44px; border-radius: 50%; margin-right: 12px; object-fit: cover; background: #eee; }
        
        /* Profile & Grid Styles */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .footer-nav { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 26px; z-index: 200; }
        #main-feed, #profile-page { display: block; }
    </style>
</head>
<body>

    <div id="main-app">
        <div class="header" id="top-header">
            <div style="font-style: italic; font-size: 22px; font-weight: bold;">Instagram</div>
            <span onclick="openEditProfile()">⚙️</span>
        </div>

        <div id="search-page">
            <input type="text" class="search-bar" id="search-input" placeholder="Search friends by name..." oninput="searchUsers()">
            <div id="search-results"></div>
        </div>

        <div id="main-feed"></div>

        <div id="profile-page" style="display:none; padding: 20px; text-align:center;">
            <img id="view-dp" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            <h3 id="view-name">User Name</h3>
            <div id="view-grid" class="grid"></div>
        </div>

        <div class="footer-nav">
            <span onclick="showSection('feed')">🏠</span>
            <span onclick="showSection('search')">🔍</span>
            <span onclick="addNewPost()" style="color:#0095f6;">➕</span>
            <span onclick="showMyProfile()">👤</span>
        </div>
    </div>

    <script>
        // --- CONFIG (Keep yours same) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUserData = {};

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                currentUserData = doc.data() || { name: "User" };
                showSection('feed');
            } else { window.location.href="index.html"; }
        });

        // Navigation Switcher
        function showSection(name) {
            document.getElementById('main-feed').style.display = name === 'feed' ? 'block' : 'none';
            document.getElementById('search-page').style.display = name === 'search' ? 'block' : 'none';
            document.getElementById('profile-page').style.display = name === 'profile' ? 'block' : 'none';
            if(name === 'feed') loadFeed();
        }

        // SEARCH LOGIC
        async function searchUsers() {
            const query = document.getElementById('search-input').value.toLowerCase();
            if(!query) { document.getElementById('search-results').innerHTML = ""; return; }

            const snap = await db.collection("users").get(); // Get all users
            let resultsHtml = "";
            snap.forEach(doc => {
                const u = doc.data();
                if(u.name && u.name.toLowerCase().includes(query)) {
                    resultsHtml += `
                        <div class="user-result" onclick="viewUserProfile('${doc.id}', '${u.name}', '${u.dp}')">
                            <img src="${u.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="dp-med">
                            <b>${u.name}</b>
                        </div>`;
                }
            });
            document.getElementById('search-results').innerHTML = resultsHtml;
        }

        // VIEW A FRIEND'S PROFILE
        async function viewUserProfile(uid, name, dp) {
            showSection('profile');
            document.getElementById('view-name').innerText = name;
            document.getElementById('view-dp').src = dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            
            const snap = await db.collection("posts").where("uid", "==", uid).get();
            let gridHtml = "";
            snap.forEach(doc => { gridHtml += `<img src="${doc.data().url}">`; });
            document.getElementById('view-grid').innerHTML = gridHtml || "<p>No posts yet</p>";
        }

        function showMyProfile() {
            viewUserProfile(auth.currentUser.uid, currentUserData.name, currentUserData.dp);
        }

        function loadFeed() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `
                        <div style="background:white; border:1px solid #dbdbdb; margin-bottom:10px;">
                            <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                            <img src="${d.url}" style="width:100%">
                        </div>`;
                });
                document.getElementById('main-feed').innerHTML = html;
            });
        }

        function addNewPost() {
            const url = prompt("Photo URL:");
            if (url) {
                db.collection("posts").add({
                    url: url, uid: auth.currentUser.uid, username: currentUserData.name, time: Date.now()
                });
            }
        }
    </script>
</body>
</html>
