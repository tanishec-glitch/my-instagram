<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Chat Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; overflow-x: hidden; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: bold; font-style: italic; font-size: 22px; }
        .section { display: none; padding-bottom: 70px; min-height: 90vh; }
        .active { display: block; }

        /* Heart Animation */
        .post-img-wrap { position: relative; width: 100%; }
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 80px; color: white; opacity: 0; transition: all 0.3s; pointer-events: none; }
        .big-heart.animate { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }

        /* Chat System */
        .chat-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; background: white; }
        .msg-box { height: 70vh; overflow-y: auto; padding: 15px; background: #fdfdfd; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 15px; margin: 5px; max-width: 70%; word-wrap: break-word; }
        .sent { background: #0095f6; color: white; align-self: flex-end; }
        .rec { background: #efefef; color: black; align-self: flex-start; }

        /* General Styles */
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .profile-dp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #ddd; }
    </style>
</head>
<body>

    <div class="header">
        Instagram 
        <span onclick="show('chat')" style="font-size: 24px; cursor: pointer;">📩</span>
    </div>

    <div id="feed-sec" class="section active"></div>

    <div id="reels-sec" class="section" style="background:black;"></div>

    <div id="profile-sec" class="section" style="text-align:center; padding:20px;">
        <img id="p-dp" src="" class="profile-dp">
        <h3 id="p-name">Username</h3>
        <button onclick="openEdit()" style="margin-bottom:20px; padding:5px 15px;">Edit Profile</button>
        <div id="p-grid" class="grid"></div>
    </div>

    <div id="chat-sec" class="section">
        <h3 style="padding:15px; margin:0;">Messages</h3>
        <div id="user-list"></div>
    </div>

    <div id="chat-window-sec" class="section">
        <div style="padding:10px; background:white; border-bottom:1px solid #ddd; display:flex; align-items:center;">
            <span onclick="show('chat')" style="margin-right:15px; font-size:20px;">⬅️</span>
            <b id="chatting-with">User</b>
        </div>
        <div id="msg-container" class="msg-box"></div>
        <div style="display:flex; padding:10px; background:white;">
            <input type="text" id="msg-input" placeholder="Message..." style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd;">
            <button onclick="sendMsg()" style="border:none; background:none; color:#0095f6; font-weight:bold; padding:10px;">Send</button>
        </div>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let myData = { name: "User", dp: "" };
        let activeChatId = "";

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                myData = doc.data() || { name: user.email.split('@')[0], dp: "" };
                show('feed');
                loadChatUsers();
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            if(id === 'feed') loadFeed();
            if(id === 'reels') loadReels();
            if(id === 'profile') loadProfile();
        }

        // --- FEED & HEART ---
        let lastTap = 0;
        function loadFeed() {
            db.collection("posts").where("type", "==", "photo").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div style="background:white; border-bottom:1px solid #dbdbdb; margin-bottom:10px;">
                        <div style="padding:10px; font-weight:600;">@${d.username}</div>
                        <div class="post-img-wrap" onclick="doubleTap('${doc.id}', ${d.likes || 0}, this)">
                            <div class="big-heart">❤️</div>
                            <img src="${d.url}" style="width:100%">
                        </div>
                        <div style="padding:10px;"><b>${d.likes || 0} likes</b></div>
                    </div>`;
                });
                document.getElementById('feed-sec').innerHTML = h;
            });
        }
        function doubleTap(id, likes, el) {
            const now = Date.now();
            if (now - lastTap < 300) {
                const h = el.querySelector('.big-heart');
                h.classList.add('animate'); setTimeout(() => h.classList.remove('animate'), 800);
                db.collection("posts").doc(id).update({ likes: likes + 1 });
            }
            lastTap = now;
        }

        // --- CHAT SYSTEM ---
        async function loadChatUsers() {
            const snap = await db.collection("users").get();
            let h = "";
            snap.forEach(doc => {
                if(doc.id !== auth.currentUser.uid) {
                    const u = doc.data();
                    h += `<div class="chat-item" onclick="openChat('${doc.id}', '${u.name}')">
                        <img src="${u.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:45px; height:45px; border-radius:50%; margin-right:15px;">
                        <b>${u.name}</b>
                    </div>`;
                }
            });
            document.getElementById('user-list').innerHTML = h || "<p style='padding:20px;'>No friends yet</p>";
        }

        function openChat(userId, name) {
            activeChatId = userId;
            document.getElementById('chatting-with').innerText = name;
            show('chat-window');
            loadMessages();
        }

        function loadMessages() {
            const combinedId = [auth.currentUser.uid, activeChatId].sort().join("_");
            db.collection("chats").doc(combinedId).collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const cls = m.sender === auth.currentUser.uid ? "sent" : "rec";
                    h += `<div class="msg ${cls}">${m.text}</div>`;
                });
                const container = document.getElementById('msg-container');
                container.innerHTML = h;
                container.scrollTop = container.scrollHeight;
            });
        }

        async function sendMsg() {
            const text = document.getElementById('msg-input').value;
            if(!text) return;
            const combinedId = [auth.currentUser.uid, activeChatId].sort().join("_");
            await db.collection("chats").doc(combinedId).collection("messages").add({
                text: text, sender: auth.currentUser.uid, time: Date.now()
            });
            document.getElementById('msg-input').value = "";
        }

        // --- REELS & PROFILE ---
        function loadReels() {
            db.collection("posts").where("type", "==", "reel").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    h += `<div style="height:90vh; scroll-snap-align:start; position:relative;">
                        <video src="${doc.data().url}" style="width:100%; height:100%; object-fit:cover;" loop autoplay muted></video>
                    </div>`;
                });
                document.getElementById('reels-sec').innerHTML = h;
            });
        }

        function loadProfile() {
            document.getElementById('p-name').innerText = myData.name;
            document.getElementById('p-dp').src = myData.dp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            db.collection("posts").where("uid", "==", auth.currentUser.uid).get().then(snap => {
                let gh = "";
                snap.forEach(doc => { gh += `<img src="${doc.data().url}">`; });
                document.getElementById('p-grid').innerHTML = gh;
            });
        }

        function upload() {
            const t = confirm("Reel? (Cancel for Photo)") ? "reel" : "photo";
            const u = prompt("URL:");
            if(u) db.collection("posts").add({
                url: u, type: t, uid: auth.currentUser.uid, username: myData.name, likes: 0, time: Date.now()
            });
        }
    </script>
</body>
</html>
