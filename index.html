<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Profile Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; font-weight: bold; font-style: italic; font-size: 22px; z-index: 100; }
        .section { display: none; }
        .active { display: block; }
        .post-card { background: white; border-bottom: 1px solid #dbdbdb; margin-bottom: 15px; }
        .post-user { padding: 10px; font-weight: 600; font-size: 14px; }
        .post-img, .reel-vid { width: 100%; display: block; }
        .reel-vid { height: 80vh; object-fit: cover; background: #000; }
        .profile-header { padding: 20px; text-align: center; border-bottom: 1px solid #dbdbdb; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
    </style>
</head>
<body>

    <div class="header">Instagram</div>

    <div id="feed-sec" class="section active"></div>

    <div id="search-sec" class="section" style="padding:15px;">
        <input type="text" placeholder="Search friends..." style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <p style="color:gray; text-align:center;">Search feature coming soon!</p>
    </div>

    <div id="reels-sec" class="section"></div>

    <div id="profile-sec" class="section">
        <div class="profile-header">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; background:#eee;">
            <h3 id="profile-name">My Profile</h3>
            <p id="profile-email" style="color:gray; font-size:14px;"></p>
        </div>
        <div id="profile-grid" class="grid"></div>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="show('search')">🔍</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Section Switcher
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            if(id === 'feed') loadPosts('photo', 'feed-sec');
            if(id === 'reels') loadPosts('reel', 'reels-sec');
            if(id === 'profile') loadMyPosts();
        }

        // Load Posts
        function loadPosts(type, targetId) {
            db.collection("posts").where("type", "==", type).onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(type === 'photo') {
                        html += `<div class="post-card"><div class="post-user">@${d.username}</div><img src="${d.url}" class="post-img"></div>`;
                    } else {
                        html += `<div class="post-card"><video src="${d.url}" class="reel-vid" controls autoplay loop muted></video></div>`;
                    }
                });
                document.getElementById(targetId).innerHTML = html || "<p style='text-align:center; padding:20px;'>Nothing here yet.</p>";
            });
        }

        // Load Profile Grid
        function loadMyPosts() {
            const user = auth.currentUser;
            if(!user) return;
            document.getElementById('profile-email').innerText = user.email;
            
            db.collection("posts").where("uid", "==", user.uid).get().then(snap => {
                let gridHtml = "";
                snap.forEach(doc => {
                    gridHtml += `<img src="${doc.data().url}">`;
                });
                document.getElementById('profile-grid').innerHTML = gridHtml || "<p style='padding:20px;'>No posts yet</p>";
            });
        }

        // Upload
        function upload() {
            const type = confirm("Reel upload karni hai? (Cancel for Photo)") ? "reel" : "photo";
            const url = prompt("Paste URL:");
            if(url && auth.currentUser) {
                db.collection("posts").add({
                    url: url,
                    type: type,
                    uid: auth.currentUser.uid,
                    username: auth.currentUser.email.split('@')[0],
                    time: Date.now()
                }).then(() => alert("Uploaded!"));
            }
        }

        // Check Login and Start
        auth.onAuthStateChanged(user => {
            if (user) show('feed');
            else {
                const e = prompt("Email:");
                const p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(() => alert("Login error"));
            }
        });
    </script>
</body>
</html>
