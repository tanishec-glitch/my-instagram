<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinCash Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Navbar */
        .nav { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .wallet { background: #334155; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--gold); font-weight: bold; color: var(--gold); }

        /* Screens */
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards */
        .card { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .btn { background: var(--gold); color: #000; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; }

        /* Quiz Options */
        .opt { display: block; width: 100%; background: #334155; color: white; border: 1px solid #475569; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; font-size: 16px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="nav-bar" class="nav" style="display:none;">
        <b style="font-size: 20px;">WinCash 🏆</b>
        <div class="wallet">₹<span id="bal">0</span></div>
    </div>

    <div id="login-scr" class="screen active">
        <div style="margin-top: 80px;">
            <h1 style="font-size: 40px; color: var(--gold);">WinCash</h1>
            <p>Kheliye, Jeetiye aur Withdraw kijiye!</p>
            <div class="card">
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="pass" placeholder="Password (6+ chars)">
                <button class="btn" onclick="authNow('login')">Login</button>
                <button class="btn-outline" onclick="authNow('reg')">Create New Account</button>
            </div>
        </div>
    </div>

    <div id="home-scr" class="screen">
        <div class="card">
            <h2 style="margin-top:0;">Math Challenge ⚡</h2>
            <p style="color: #94a3b8;">Entry Fee: <b>₹10</b> | Prize: <b style="color:#22c55e;">₹20</b></p>
            <button class="btn" onclick="startPlay()">Pay ₹10 & Play</button>
        </div>
        
        <div class="card" style="border-color: #ef4444;">
            <h3>Withdraw Winnings 💸</h3>
            <input type="text" id="upi" placeholder="Your UPI ID (name@apl)">
            <input type="number" id="amt" placeholder="Amount (Min ₹50)">
            <button class="btn" style="background:#ef4444; color:white;" onclick="withdraw()">Withdraw to UPI</button>
        </div>
        <button class="btn-outline" onclick="addMoneyDemo()">+ Add Demo Cash (Test)</button>
    </div>

    <div id="game-scr" class="screen">
        <div class="card">
            <h2 id="q-text">Loading...</h2>
            <div id="q-opts"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let wallet = 0;
        let me = null;

        // --- AUTH ---
        function authNow(type) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Details bharo!");
            if(type === 'reg') {
                auth.createUserWithEmailAndPassword(e, p).then(u => {
                    db.collection("wallets").doc(u.user.uid).set({ balance: 20 });
                    alert("Account Created! ₹20 Bonus Added.");
                }).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                me = user;
                document.getElementById('login-scr').classList.remove('active');
                document.getElementById('nav-bar').style.display = 'flex';
                showScreen('home-scr');
                loadWallet();
            } else {
                document.getElementById('login-scr').classList.add('active');
                document.getElementById('nav-bar').style.display = 'none';
            }
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadWallet() {
            db.collection("wallets").doc(me.uid).onSnapshot(doc => {
                wallet = doc.data().balance;
                document.getElementById('bal').innerText = wallet;
            });
        }

        // --- GAME LOGIC ---
        function startPlay() {
            if(wallet < 10) return alert("Wallet khali hai! Demo cash add karo.");
            db.collection("wallets").doc(me.uid).update({ balance: wallet - 10 }).then(() => {
                showScreen('game-scr');
                generateQ();
            });
        }

        function generateQ() {
            const n1 = Math.floor(Math.random()*30), n2 = Math.floor(Math.random()*30);
            const ans = n1 + n2;
            document.getElementById('q-text').innerText = `${n1} + ${n2} = ?`;
            let opts = [ans, ans+5, ans-2, ans+10].sort(() => Math.random() - 0.5);
            let h = "";
            opts.forEach(o => h += `<button class="opt" onclick="check(${o},${ans})">${o}</button>`);
            document.getElementById('q-opts').innerHTML = h;
        }

        function check(sel, cor) {
            if(sel === cor) {
                alert("Winner! ₹20 Jeet Gaye 🏆");
                db.collection("wallets").doc(me.uid).update({ balance: wallet + 20 });
            } else { alert("Wrong! ₹10 Haar Gaye ❌"); }
            showScreen('home-scr');
        }

        // --- WITHDRAW & ADD ---
        function addMoneyDemo() { db.collection("wallets").doc(me.uid).update({ balance: wallet + 100 }); }

        function withdraw() {
            const upi = document.getElementById('upi').value;
            const amt = parseInt(document.getElementById('amt').value);
            if(!upi.includes('@')) return alert("Sahi UPI ID dalo");
            if(amt < 50 || amt > wallet) return alert("Invalid Amount (Min ₹50)");

            db.collection("withdrawals").add({
                uid: me.uid, email: me.email, upi: upi, amount: amt, status: "Pending", time: Date.now()
            }).then(() => {
                db.collection("wallets").doc(me.uid).update({ balance: wallet - amt });
                alert("Withdraw Request Sent! 24 Hours wait karein.");
            });
        }
    </script>
</body>
</html>
