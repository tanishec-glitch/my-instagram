<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Final Repair</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; font-style: italic; font-size: 22px; }
        .section { display: none; padding-bottom: 80px; min-height: 100vh; }
        .active { display: block; }

        /* Post & Heart */
        .post-card { background: white; border-bottom: 1px solid #dbdbdb; margin-bottom: 10px; }
        .post-img-wrap { position: relative; width: 100%; }
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 80px; color: white; opacity: 0; transition: 0.3s; pointer-events: none; }
        .big-heart.animate { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }

        /* Profile & Modal */
        .profile-header { padding: 20px; text-align: center; background: white; }
        .p-dp { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid #0095f6; }
        .btn-edit { background: #efefef; border: none; padding: 7px 20px; border-radius: 5px; font-weight: 600; margin-top: 10px; width: 80%; }
        #edit-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; padding:20px; box-sizing:border-box; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }

        /* Footer */
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Instagram</div>
        <div style="display:flex; gap:15px; align-items:center;">
            <span onclick="show('chat')" style="cursor:pointer">📩</span>
            <span onclick="userLogout()" style="color:#ed4956; font-size:14px; font-weight:bold; cursor:pointer">Logout</span>
        </div>
    </div>

    <div id="feed-sec" class="section active"></div>
    <div id="reels-sec" class="section" style="background:black;"></div>
    
    <div id="profile-sec" class="section">
        <div class="profile-header">
            <img id="my-dp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="p-dp">
            <h3 id="my-name" style="margin:10px 0;">User</h3>
            <p id="my-bio" style="color:gray; font-size:14px;">No bio</p>
            <button class="btn-edit" onclick="openEdit()">Edit Profile</button>
        </div>
        <div id="my-grid" class="grid"></div>
    </div>

    <div id="chat-sec" class="section">
        <h3 style="padding:15px;">Inbox</h3>
        <div id="user-list"></div>
    </div>

    <div id="edit-modal">
        <h2 style="text-align:center">Update Profile</h2>
        <input type="text" id="up-name" placeholder="Name">
        <input type="text" id="up-bio" placeholder="Bio">
        <input type="text" id="up-dp" placeholder="Profile Pic URL">
        <button onclick="saveMyProfile()" style="width:100%; padding:12px; background:#0095f6; color:white; border:none; border-radius:5px; font-weight:bold;">Save</button>
        <button onclick="closeEdit()" style="width:100%; margin-top:10px; background:none; border:none; color:gray;">Cancel</button>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let userData = { name: "User", dp: "", bio: "" };

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) userData = doc.data();
                show('feed');
            } else {
                let e = prompt("Email:"); let p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(()=>location.reload());
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            if(id === 'feed') loadFeed();
            if(id === 'reels') loadReels();
            if(id === 'profile') loadProfilePage();
            if(id === 'chat') loadInbox();
        }

        // --- LIKES & FEED ---
        let tapTime = 0;
        function loadFeed() {
            db.collection("posts").where("type","==","photo").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="post-card">
                        <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                        <div class="post-img-wrap" onclick="doLike('${doc.id}', ${d.likes || 0}, this)">
                            <div class="big-heart">❤️</div>
                            <img src="${d.url}" style="width:100%">
                        </div>
                        <div style="padding:10px;">❤️ <b>${d.likes || 0} likes</b></div>
                    </div>`;
                });
                document.getElementById('feed-sec').innerHTML = h;
            });
        }
        function doLike(id, l, el) {
            const now = Date.now();
            if(now - tapTime < 300) {
                el.querySelector('.big-heart').classList.add('animate');
                setTimeout(()=>el.querySelector('.big-heart').classList.remove('animate'), 800);
                db.collection("posts").doc(id).update({ likes: l + 1 });
            }
            tapTime = now;
        }

        // --- PROFILE EDIT ---
        function openEdit() {
            document.getElementById('up-name').value = userData.name;
            document.getElementById('up-bio').value = userData.bio;
            document.getElementById('up-dp').value = userData.dp;
            document.getElementById('edit-modal').style.display = 'block';
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        async function saveMyProfile() {
            const uid = auth.currentUser.uid;
            userData = {
                name: document.getElementById('up-name').value,
                bio: document.getElementById('up-bio').value,
                dp: document.getElementById('up-dp').value
            };
            await db.collection("users").doc(uid).set(userData);
            alert("Updated!"); closeEdit(); loadProfilePage();
        }

        // --- LOGOUT ---
        function userLogout() {
            if(confirm("Logout karna hai?")) {
                auth.signOut().then(() => location.reload());
            }
        }

        // --- REELS & OTHER ---
        function loadReels() {
            db.collection("posts").where("type","==","reel").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    h += `<div style="height:90vh; scroll-snap-align:start; position:relative; background:black;">
                        <video src="${doc.data().url}" style="width:100%; height:100%; object-fit:cover;" autoplay loop muted playsinline></video>
                    </div>`;
                });
                document.getElementById('reels-sec').innerHTML = h;
            });
        }

        function loadProfilePage() {
            document.getElementById('my-name').innerText = userData.name;
            document.getElementById('my-bio').innerText = userData.bio || "No bio";
            document.getElementById('my-dp').src = userData.dp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            db.collection("posts").where("uid","==",auth.currentUser.uid).get().then(snap => {
                let gh = ""; snap.forEach(doc => { gh += `<img src="${doc.data().url}">`; });
                document.getElementById('my-grid').innerHTML = gh;
            });
        }

        function upload() {
            const t = confirm("Reel? (Cancel for Photo)") ? "reel" : "photo";
            const u = prompt("URL:");
            if(u) db.collection("posts").add({
                url: u, type: t, uid: auth.currentUser.uid, username: userData.name, likes: 0, time: Date.now()
            });
        }
    </script>
</body>
</html>
