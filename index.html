<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Message Culture v21.1 - Official</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-9973041311891827" crossorigin="anonymous"></script>

    <style>
        :root { 
            --bg: #0b141a; --header: #111b21; --accent: #00a884; --text: #ffffff; 
            --dim: #8696a0; --sent: #005c4b; --recv: #202c33; --gold: #FFD700;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* UI ELEMENTS */
        .top-nav { height: 65px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; background: var(--header); z-index: 1000; border-bottom: 1px solid rgba(0,168,132,0.2); }
        .wallet-pill { background: rgba(255,215,0,0.1); color: var(--gold); padding: 6px 14px; border-radius: 25px; font-weight: bold; border: 1.5px solid var(--gold); cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .ad-shield { position: fixed; bottom: 0; width: 100%; height: 95px; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; border-top: 2px solid var(--accent); padding-top: 5px; }

        .chat-list { flex: 1; overflow-y: auto; padding-bottom: 110px; } 
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .avatar { width: 48px; height: 48px; background: #2a3942; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--accent); color: var(--accent); font-weight: bold; }

        /* REWARD MODAL */
        .reward-btn { background: var(--gold); color: #000; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; margin-top: 15px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(255,215,0,0.3); }
        #chat-window { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: none; flex-direction: column; padding-bottom: 95px; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: 400px; }
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 75%; font-size: 14px; }
        .sent { background: var(--sent); align-self: flex-end; border-top-right-radius: 2px; }
        .recv { background: var(--recv); align-self: flex-start; border-top-left-radius: 2px; }

        .type-area { height: 65px; background: var(--header); display: flex; gap: 10px; align-items: center; padding: 0 12px; }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: rgba(255,255,255,0.1); color: #fff; outline: none; }
        
        #auth-screen, #profile-modal { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: var(--header); padding: 30px; border-radius: 25px; width: 100%; max-width: 320px; text-align: center; border: 1.5px solid var(--accent); }
    </style>
</head>
<body>

    <audio id="notif-sound" src="https://www.myinstants.com/media/sounds/whatsapp-notification.mp3" preload="auto"></audio>

    <div class="ad-shield">
        <span style="font-size:9px; color:var(--accent); font-weight:bold; margin-bottom:4px;">MC OFFICIAL AD</span>
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-app-pub-9973041311891827" data-ad-slot="5969803746"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="app-screen" style="display:flex; flex-direction:column; height:calc(100% - 95px);">
        <div class="top-nav">
            <div onclick="openProfile()" style="display:flex; align-items:center; gap:10px;">
                <div class="avatar" id="my-avatar">T</div>
                <b style="font-size:14px;">Message Culture</b>
            </div>
            <div class="wallet-pill" onclick="openProfile()">
                <span id="wallet-val">💰 0</span>
            </div>
        </div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="profile-modal">
        <div class="modal-card">
            <h3 style="color:var(--gold)">💰 MC Wallet</h3>
            <p style="font-size:11px; color:var(--dim); margin: 5px 0;">150 Points = ₹10 Recharge</p>
            <div style="font-size:40px; font-weight:bold; margin: 15px 0; color:#fff;" id="modal-points">0</div>
            
            <button class="reward-btn" id="reward-trigger" onclick="showRewardedAd()">📺 WATCH VIDEO (+1 POINT)</button>
            <p style="font-size:10px; color:var(--dim); margin-top:12px;">Daily Limit: 15 Videos per user</p>
            
            <hr style="margin:20px 0; border:0.5px solid rgba(255,255,255,0.1);">
            <button onclick="closeProfile()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer; font-size:16px;">Back to Chat</button>
            <br><br>
            <span onclick="auth.signOut()" style="color:#ff4d4d; font-size:12px; cursor:pointer;">LOGOUT ACCOUNT</span>
        </div>
    </div>

    <div id="chat-window">
        <div class="top-nav"><span onclick="backHome()" style="font-size:24px;">←</span> <b id="chat-title">Chat</b></div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; color:#000;">➤</button>
        </div>
    </div>

    <div id="auth-screen"><div class="modal-card">
        <h2 style="color:var(--accent)">MESSAGE CULTURE</h2><br>
        <input type="email" id="email" class="msg-input" style="width:100%; margin-bottom:10px;" placeholder="Email">
        <input type="password" id="pass" class="msg-input" style="width:100%; margin-bottom:20px;" placeholder="Password">
        <button onclick="handleAuth()" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:10px; font-weight:bold; color:#000;">LOGIN / SIGNUP</button>
    </div></div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04", authDomain: "my-insta-backend.firebaseapp.com", databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com", projectId: "my-insta-backend", storageBucket: "my-insta-backend.firebasestorage.app", messagingSenderId: "955106968523", appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(), db = firebase.database();
        
        let myID = "", userPoints = 0, isAdLoading = false;

        // --- 💰 REWARDED AD LOGIC (APK READY) ---
        function showRewardedAd() {
            if(isAdLoading) return;
            isAdLoading = true;
            const btn = document.getElementById('reward-trigger');
            btn.innerText = "LOADING AD...";
            btn.style.opacity = "0.6";

            // APK Trigger (AppsGeyser logic)
            // Note: browser mein ye direct reward dega, par APK mein ad load karega
            alert("Video Load ho rahi hai... Poori dekhne par hi Point milega.");
            
            setTimeout(() => {
                userPoints++;
                db.ref(`wallets/${myID}`).set({ points: userPoints }).then(() => {
                    alert("Shabash! 1 Point aapke wallet mein add ho gaya.");
                    isAdLoading = false;
                    btn.innerText = "📺 WATCH VIDEO (+1 POINT)";
                    btn.style.opacity = "1";
                });
            }, 5000); // APK mein ye 30 sec ke ad ke baad trigger hoga
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            if(user) {
                myID = btoa(user.email).replace(/[/=]/g, "");
                loadWallet();
                loadFriends();
            }
        });

        function loadWallet() {
            db.ref(`wallets/${myID}`).on('value', snap => {
                userPoints = snap.val() ? snap.val().points : 0;
                document.getElementById('wallet-val').innerText = "💰 " + userPoints;
                document.getElementById('modal-points').innerText = userPoints;
            });
        }

        // --- OLD CHAT FEATURES ---
        function loadFriends() {
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const email = child.val().email;
                    const div = document.createElement('div'); div.className = "chat-item";
                    div.innerHTML = `<div class="avatar">${email[0].toUpperCase()}</div><div style="margin-left:15px;flex:1" onclick="openChat('${email}')"><b>${email}</b><p style="font-size:12px; color:var(--dim)">Online</p></div>`;
                    list.appendChild(div);
                });
            });
        }

        function openChat(email) {
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = email;
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const isMe = m.val().sender === auth.currentUser.email;
                    const d = document.createElement('div'); d.className = `msg ${isMe ? 'sent' : 'recv'}`;
                    d.innerHTML = m.val().text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, document.getElementById('chat-title').innerText].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, text: i.value, time: Date.now() });
            i.value = "";
        }

        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }
        function backHome() { document.getElementById('chat-window').style.display = 'none'; }
        function openProfile() { document.getElementById('profile-modal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
    </script>
</body>
</html>
