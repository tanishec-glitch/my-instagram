<!DOCTYPE html>
<html>
<head>
    <title>Tanish Messenger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b141a; color: white; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3b4a54; }
        
        /* Chat List */
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .u-item { background: #111b21; padding: 15px; margin-bottom: 5px; border-radius: 10px; cursor: pointer; border: 1px solid #222; }
        
        /* Chat Box */
        #chat-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b141a; z-index: 100; flex-direction: column; }
        .msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .bubble { padding: 10px 15px; border-radius: 15px; margin: 5px; max-width: 70%; font-size: 15px; line-height: 1.4; }
        .me { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .them { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        /* Input area */
        .input-area { background: #202c33; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; background: #2a3942; border: none; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #00a884; border: none; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; }

        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-btn { background: #00a884; padding: 15px 40px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Tanish Messenger</h2>
        <div class="login-btn" onclick="login()">Enter Chat</div>
    </div>

    <div id="main-app" class="app" style="display:none;">
        <div class="header">
            <b>Messages</b>
            <span onclick="auth.signOut()" style="color: #ed4956; font-size: 13px;">Logout</span>
        </div>
        <div class="user-list" id="users"></div>
    </div>

    <div id="chat-window">
        <div class="header">
            <span onclick="closeChat()">⬅️</span>
            <b id="chat-with">User</b>
            <span></span>
        </div>
        <div class="msgs" id="msg-container"></div>
        <div class="input-area">
            <input id="m-input" placeholder="Type a message...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = "";
        let targetId = "";

        // Simple Login for testing
        function login() {
            let email = prompt("Email:");
            let pass = prompt("Password:");
            auth.signInWithEmailAndPassword(email, pass).catch(() => {
                auth.createUserWithEmailAndPassword(email, pass).then(u => {
                    db.collection("users").doc(u.user.uid).set({name: email.split('@')[0], email: email});
                });
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                me = user.uid;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                loadUsers();
            } else {
                location.reload();
            }
        });

        function loadUsers() {
            db.collection("users").get().then(snap => {
                let h = "";
                snap.forEach(doc => {
                    if (doc.id !== me) {
                        h += `<div class="u-item" onclick="openChat('${doc.id}', '${doc.data().name}')">
                            <b>${doc.data().name}</b><br>
                            <small style="color:gray;">Tap to chat</small>
                        </div>`;
                    }
                });
                document.getElementById('users').innerHTML = h || "No users online";
            });
        }

        function openChat(id, name) {
            targetId = id;
            document.getElementById('chat-with').innerText = name;
            document.getElementById('chat-window').style.display = 'flex';
            
            const cid = [me, targetId].sort().join("_");
            db.collection("chats").doc(cid).collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    h += `<div class="bubble ${m.from === me ? 'me' : 'them'}">${m.text}</div>`;
                });
                const container = document.getElementById('msg-container');
                container.innerHTML = h;
                container.scrollTop = container.scrollHeight;
            });
        }

        function send() {
            const t = document.getElementById('m-input').value;
            if (!t) return;
            const cid = [me, targetId].sort().join("_");
            db.collection("chats").doc(cid).collection("messages").add({
                text: t, from: me, time: Date.now()
            });
            document.getElementById('m-input').value = "";
        }

        function closeChat() {
            document.getElementById('chat-window').style.display = 'none';
        }
    </script>
</body>
</html>
