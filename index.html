<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Wallet & Chat Pro</title>
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0.0/unityads.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #FFD700; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-container { background: #111; border: 2px solid #FFD700; border-radius: 20px; width: 350px; height: 600px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 25px #b8860b; }
        #auth-section, #main-app { padding: 20px; display: none; flex-direction: column; height: 100%; }
        .active { display: flex !important; }
        input { width: 90%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #FFD700; background: #222; color: #fff; }
        .btn { background: linear-gradient(45deg, #FFD700, #b8860b); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .tabs { display: flex; background: #222; border-bottom: 1px solid #FFD700; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; }
        .tab.active-tab { background: #FFD700; color: #000; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; display: none; padding: 15px; }
        .show { display: block !important; }
        .chat-box { height: 280px; background: #000; border: 1px solid #333; border-radius: 10px; padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        .msg { position: relative; margin-bottom: 10px; padding: 8px; background: #1a1a1a; border-radius: 5px; }
        .del-btn { color: red; font-size: 10px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="auth-section" class="active">
            <h2 style="text-align:center">MC PRO LOGIN</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="login()">LOGIN</button>
            <button class="btn" style="background:none; color:#FFD700; border:1px solid #FFD700" onclick="register()">REGISTER</button>
        </div>

        <div id="main-app">
            <div class="tabs">
                <div class="tab active-tab" id="t1" onclick="switchTab('wallet')">WALLET</div>
                <div class="tab" id="t2" onclick="switchTab('chat')">CHAT</div>
                <div class="tab" id="t3" onclick="switchTab('friends')">FRIENDS</div>
            </div>

            <div id="wallet" class="content show">
                <h3>Balance: ₹ <span id="bal">0</span></h3>
                <button class="btn" onclick="playAd()">WATCH VIDEO & EARN</button>
            </div>

            <div id="chat" class="content">
                <div id="chat-box" class="chat-box"></div>
                <input type="text" id="m-input" placeholder="Message..." style="width:70%">
                <button class="btn" style="width:25%; padding:10px" onclick="sendMsg()">SEND</button>
            </div>

            <div id="friends" class="content">
                <input type="email" id="f-email" placeholder="Friend's Email">
                <button class="btn" onclick="addFriend()">ADD FRIEND</button>
                <div id="f-list" style="margin-top:15px"></div>
                <button onclick="logout()" style="margin-top:50px; background:none; border:none; color:grey">LOGOUT</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com",
            projectId: "my-insta-backend",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();
        unityAds.init('6078958', true); // Change 'true' to 'false' for live ads

        function login() { auth.signInWithEmailAndPassword(e('email').value, e('password').value).then(u => start(u.user.uid)).catch(x => alert(x.message)); }
        function register() { auth.createUserWithEmailAndPassword(e('email').value, e('password').value).then(u => { db.ref('users/'+u.user.uid).set({email:e('email').value, balance:0}); start(u.user.uid); }).catch(x => alert(x.message)); }
        
        function start(uid) {
            e('auth-section').classList.remove('active'); e('main-app').classList.add('active');
            db.ref('users/'+uid+'/balance').on('value', s => e('bal').innerText = s.val() || 0);
            loadChat(); loadFriends(uid);
        }

        function switchTab(t) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('show'));
            document.querySelectorAll('.tab').forEach(c => c.classList.remove('active-tab'));
            e(t).classList.add('show');
            event.currentTarget.classList.add('active-tab');
        }

        function playAd() {
            unityAds.show('Rewarded_Android', { onComplete: () => { db.ref('users/'+auth.currentUser.uid+'/balance').transaction(b => (b||0)+1); alert("+1 Earned!"); } });
        }

        function sendMsg() {
            const t = e('m-input').value; if(!t) return;
            db.ref('messages').push({ u: auth.currentUser.email.split('@')[0], t: t, uid: auth.currentUser.uid });
            e('m-input').value = "";
        }

        function loadChat() {
            db.ref('messages').limitToLast(20).on('value', s => {
                let h = ""; s.forEach(m => {
                    const d = m.val().uid === auth.currentUser.uid ? `<span class="del-btn" onclick="delMsg('${m.key}')">DELETE</span>` : "";
                    h += `<div class="msg"><b>${m.val().u}:</b> ${m.val().t} ${d}</div>`;
                });
                e('chat-box').innerHTML = h; e('chat-box').scrollTop = e('chat-box').scrollHeight;
            });
        }

        function delMsg(key) { if(confirm("Delete message?")) db.ref('messages/'+key).remove(); }
        function addFriend() { db.ref('users/'+auth.currentUser.uid+'/friends').push(e('f-email').value); alert("Added!"); }
        function loadFriends(uid) { db.ref('users/'+uid+'/friends').on('value', s => { e('f-list').innerHTML = "<h4>Friends:</h4>"; s.forEach(f => e('f-list').innerHTML += `<div>👤 ${f.val()}</div>`); }); }
        function logout() { auth.signOut().then(()=>location.reload()); }
        function e(id) { return document.getElementById(id); }
    </script>
</body>
</html>
