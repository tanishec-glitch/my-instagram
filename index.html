<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Heart Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; overflow-x: hidden; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: bold; font-style: italic; font-size: 22px; }
        .section { display: none; padding-bottom: 70px; }
        .active { display: block; }

        /* Post & Heart Animation */
        .post-container { background: white; border-bottom: 1px solid #dbdbdb; position: relative; }
        .post-img-wrap { position: relative; width: 100%; overflow: hidden; }
        .big-heart { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 80px; color: white; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 10;
        }
        .big-heart.animate { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }

        /* Reels Swipe */
        #reels-sec { background: black; height: 90vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-container { height: 90vh; width: 100%; scroll-snap-align: start; position: relative; }
        .reel-vid { width: 100%; height: 100%; object-fit: cover; }

        /* Footer & Others */
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
        .profile-dp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">Instagram</div>

    <div id="feed-sec" class="section active"></div>
    <div id="reels-sec" class="section"></div>
    <div id="profile-sec" class="section" style="text-align:center; padding:20px;">
        <img id="p-dp" src="" class="profile-dp">
        <h3 id="p-name">Username</h3>
        <div id="p-grid" class="grid"></div>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        // --- FIREBASE CONFIG (Sahi wala use karein) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let myData = { name: "User", dp: "" };

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) myData = doc.data();
                show('feed');
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            if(id === 'feed') loadFeed();
            if(id === 'reels') loadReels();
            if(id === 'profile') loadProfile();
        }

        // DOUBLE TAP LOGIC
        let lastTap = 0;
        function handleDoubleTap(postId, currentLikes, element) {
            const now = Date.now();
            if (now - lastTap < 300) {
                // Heart Animation
                const heart = element.querySelector('.big-heart');
                heart.classList.add('animate');
                setTimeout(() => heart.classList.remove('animate'), 800);
                
                // Like Database Update
                db.collection("posts").doc(postId).update({ likes: currentLikes + 1 });
            }
            lastTap = now;
        }

        function loadFeed() {
            db.collection("posts").where("type", "==", "photo").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const pid = doc.id;
                    h += `
                    <div class="post-container">
                        <div style="padding:10px; font-weight:600;">@${d.username}</div>
                        <div class="post-img-wrap" onclick="handleDoubleTap('${pid}', ${d.likes || 0}, this)">
                            <div class="big-heart">❤️</div>
                            <img src="${d.url}" style="width:100%">
                        </div>
                        <div style="padding:10px;"><b>${d.likes || 0} likes</b></div>
                    </div>`;
                });
                document.getElementById('feed-sec').innerHTML = h;
            });
        }

        function loadReels() {
            db.collection("posts").where("type", "==", "reel").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="reel-container">
                        <video src="${d.url}" class="reel-vid" loop autoplay muted playsinline></video>
                        <div style="position:absolute; bottom:20px; left:15px; color:white;"><b>@${d.username}</b></div>
                    </div>`;
                });
                document.getElementById('reels-sec').innerHTML = h;
            });
        }

        function loadProfile() {
            document.getElementById('p-name').innerText = myData.name;
            document.getElementById('p-dp').src = myData.dp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            db.collection("posts").where("uid", "==", auth.currentUser.uid).get().then(snap => {
                let gh = "";
                snap.forEach(doc => { gh += `<img src="${doc.data().url}">`; });
                document.getElementById('p-grid').innerHTML = gh;
            });
        }

        function upload() {
            const t = confirm("Reel? (Cancel for Photo)") ? "reel" : "photo";
            const u = prompt("URL:");
            if(u) db.collection("posts").add({
                url: u, type: t, uid: auth.currentUser.uid, username: myData.name, likes: 0, time: Date.now()
            });
        }
    </script>
</body>
</html>
