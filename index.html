<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Message Culture v19 - Premium Font</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-9973041311891827" crossorigin="anonymous"></script>

    <style>
        :root { 
            --bg: #0b141a; 
            --header: #111b21; 
            --accent: #00a884; 
            --text: #ffffff; 
            --font-main: 'Poppins', sans-serif; /* Modern & Clean */
            --font-msg: 'Roboto', sans-serif;  /* Best for Reading */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); /* Pura app ab Poppins mein dikhega */
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .top-nav b { font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
        
        .chat-list b { font-family: var(--font-main); font-weight: 500; font-size: 16px; }
        .chat-list p { font-family: var(--font-msg); font-size: 13px; color: #8696a0; }

        .msg { 
            font-family: var(--font-msg); /* Messages ke liye Roboto best hai */
            padding: 10px 15px; 
            border-radius: 14px; 
            max-width: 78%; 
            font-size: 14.5px; 
            line-height: 1.5;
        }

        /* Rest of the layout same as v18... */
        .ad-outer-box { position: fixed; bottom: 0; width: 100%; height: 80px; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 1.5px solid var(--accent); }
    </style>
</head>
<body>
    <div class="ad-outer-box">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-app-pub-9973041311891827"
             data-ad-slot="5969803746"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    </body>
</html>
