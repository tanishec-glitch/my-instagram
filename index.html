<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Pro | Login</title>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --accent: #00a884; --sent: #005c4b; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; }
        
        /* LOGIN STYLING */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        .input-field { width: 100%; max-width: 300px; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a3942; color: white; }
        .btn { width: 100%; max-width: 300px; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* CHAT STYLING (Hidden by default) */
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        .header { background: var(--header); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 75%; font-size: 14px; word-wrap: break-word; }
        .sent { background: var(--sent); align-self: flex-end; }
        .received { background: var(--header); align-self: flex-start; }
        .input-bar { background: var(--header); padding: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="color: var(--accent)">WhatsApp Lite</h2>
        <input type="email" id="email" class="input-field" placeholder="Email (test@me.com)">
        <input type="password" id="pass" class="input-field" placeholder="Password (6+ chars)">
        <button class="btn" onclick="handleAuth('login')">LOGIN</button>
        <button class="btn" style="background: transparent; border: 1px solid var(--accent);" onclick="handleAuth('signup')">REGISTER</button>
        <p id="error-msg" style="color: #e23744; font-size: 12px;"></p>
    </div>

    <div id="chat-screen">
        <div class="header">
            <span id="user-display">Chat</span>
            <span onclick="logout()" style="color: var(--accent); font-size: 12px;">LOGOUT</span>
        </div>
        <div class="chat-box" id="box"></div>
        <div class="input-bar">
            <input type="text" id="m" class="input-field" style="margin:0;" placeholder="Type a message">
            <button class="btn" style="width: 80px; margin:0;" onclick="send()">SEND</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "PASTE_HERE",
            authDomain: "PASTE_HERE",
            databaseURL: "PASTE_HERE",
            projectId: "PASTE_HERE",
            storageBucket: "PASTE_HERE",
            messagingSenderId: "PASTE_HERE",
            appId: "PASTE_HERE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // AUTH LOGIC
        function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const err = document.getElementById('error-msg');
            
            if(type === 'signup') {
                auth.createUserWithEmailAndPassword(email, pass).catch(e => err.innerText = e.message);
            } else {
                auth.signInWithEmailAndPassword(email, pass).catch(e => err.innerText = e.message);
            }
        }

        // AUTO-CHECK IF LOGGED IN
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('user-display').innerText = user.email;
                loadMessages();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
            }
        });

        function logout() { auth.signOut(); }

        // CHAT LOGIC
        function send() {
            const i = document.getElementById('m');
            if(i.value) {
                db.ref("global_chats").push({
                    text: i.value,
                    sender: auth.currentUser.email,
                    time: Date.now()
                });
                i.value = '';
            }
        }

        function loadMessages() {
            db.ref("global_chats").limitToLast(50).on("child_added", (snap) => {
                const data = snap.val();
                const box = document.getElementById('box');
                const d = document.createElement('div');
                d.className = data.sender === auth.currentUser.email ? "msg sent" : "msg received";
                d.innerText = data.text;
                box.appendChild(d);
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
