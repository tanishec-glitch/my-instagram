<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; margin: 0; }
        .header { background: #202c33; padding: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        .chat-box { padding: 20px; height: 70vh; overflow-y: auto; }
        .bubble { background: #005c4b; padding: 10px; border-radius: 10px; margin-bottom: 10px; width: fit-content; max-width: 80%; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #202c33; padding: 15px; display: flex; box-sizing: border-box; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; outline: none; }
        button { background: #00a884; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">🟢 Gemini Chat</div>

    <div class="chat-box">
        <div class="bubble">Hello! If you see this, the website is working. 🚀</div>
        <div class="bubble">Try typing a message below.</div>
    </div>

    <div class="input-area">
        <input type="text" id="m" placeholder="Type here...">
        <button onclick="s()">SEND</button>
    </div>

    <script>
        function s() {
            let i = document.getElementById('m');
            if(i.value) {
                let d = document.createElement('div');
                d.className = 'bubble';
                d.style.alignSelf = 'flex-end';
                d.style.background = '#343f46';
                d.innerText = i.value;
                document.querySelector('.chat-box').appendChild(d);
                i.value = '';
            }
        }
    </script>
</body>
</html>
