<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Midnight Bites | Premium Food</title>
    <style>
        /* 1. THE DARK THEME COLORS */
        :root {
            --bg: #060c21;
            --card: #111827;
            --accent: #e23744; /* Zomato Red */
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
        }

        /* 2. GLASSMORPHISM HEADER */
        .header {
            padding: 20px;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .location {
            font-size: 14px;
            color: var(--accent);
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        /* 3. PREMIUM SEARCH BAR */
        .search-container {
            padding: 15px;
        }

        .search-bar {
            width: 100%;
            padding: 14px;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* 4. FOOD CARDS */
        .food-card {
            background: var(--card);
            margin: 15px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .food-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .details {
            padding: 15px;
        }

        .res-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .rating {
            background: #24963f;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            float: right;
        }

        .meta {
            color: var(--text-dim);
            font-size: 14px;
        }

        /* 5. THE "ORDER" BUTTON */
        .order-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* BOTTOM NAV */
        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="location">📍 Bhopal, MP ▼</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search Midnight Biryani...">
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600" class="food-img">
        <div class="details">
            <span class="rating">4.5 ★</span>
            <div class="res-name">Neon Pizza Hub</div>
            <div class="meta">Italian • Cheese Burst • ₹299</div>
            <button class="order-btn">ADD TO CART</button>
        </div>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1589187151003-0dd47b29869b?w=600" class="food-img">
        <div class="details">
            <span class="rating">4.8 ★</span>
            <div class="res-name">Midnight Biryani</div>
            <div class="meta">Mughlai • Dum Biryani • ₹350</div>
            <button class="order-btn">ADD TO CART</button>
        </div>
    </div>

    <div style="height: 80px;"></div> <div class="nav">
        <div style="color: var(--accent)">🏠<br>Home</div>
        <div>🔍<br>Search</div>
        <div>🛒<br>Cart</div>
        <div>👤<br>User</div>
    </div>

</body>
</html>
