<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Culture Wallet Pro</title>
    
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0.0/unityads.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            background-color: #000; /* Black Theme */
            color: #FFD700; /* Gold/Yellow Text */
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 0 15px #FFD700;
        }
        .btn {
            background-color: #FFD700;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .balance {
            font-size: 40px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>MC Wallet Pro</h2>
        <p>Aapka Balance:</p>
        <div class="balance">₹ <span id="wallet-balance">0</span></div>
        <button class="btn" onclick="showAd()">WATCH VIDEO & EARN</button>
    </div>

    <script>
        // 1. Firebase Setup (Apna purana data yahan dalo)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Unity Ads Setup (Teri New ID)
        const gameId = '6078958'; 
        unityAds.init(gameId, true); // true matlab Test Mode On (Check karne ke liye)

        let balance = 0;

        // Ad dikhane ka function
        function showAd() {
            console.log("Ad loading...");
            unityAds.show('Rewarded_Android', {
                onComplete: () => {
                    updateBalance();
                    alert("Shabash! 1 Point aapke wallet mein add ho gaya.");
                },
                onError: (error) => {
                    alert("Ad abhi load nahi hui, 2 second baad fir try karo.");
                    console.log(error);
                }
            });
        }

        // Balance update karne ka function
        function updateBalance() {
            balance += 1;
            document.getElementById('wallet-balance').innerText = balance;
            
            // Firebase mein save karo (Tanish Mandloi ke naam se)
            database.ref('users/tanish/balance').set(balance);
        }
    </script>

</body>
</html>
